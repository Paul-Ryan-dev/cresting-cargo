<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cresting Cargo - Internal Admin Control Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="admin-body">
  

  <header style="background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);">
    <div class="title"><i class="fas fa-shield-halved"></i> Cresting Cargo <span style="font-size: 1rem; color: #ffc107; font-weight: 500;">Admin Hub</span></div>
    <nav>
      <a href="index.html"><i class="fas fa-arrow-left"></i> Return to Client Site</a>
    </nav>
  </header>


  <main style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px;">
      <div style="background: var(--bg-container); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px var(--shadow-accent);">
        <small style="color: var(--text-muted); text-transform: uppercase; font-weight: bold; font-size: 0.75rem;">Total Tracked Loads</small>
        <h2 id="metric-total" style="font-size: 2rem; color: #0077cc; margin-top: 5px;">3</h2>
      </div>
      <div style="background: var(--bg-container); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px var(--shadow-accent);">
        <small style="color: var(--text-muted); text-transform: uppercase; font-weight: bold; font-size: 0.75rem;">Active Exceptions / Holds</small>
        <h2 id="metric-holds" style="font-size: 2rem; color: #dc3545; margin-top: 5px;">1</h2>
      </div>
      <div style="background: var(--bg-container); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px var(--shadow-accent);">
        <small style="color: var(--text-muted); text-transform: uppercase; font-weight: bold; font-size: 0.75rem;">Operational Status</small>
        <h2 style="font-size: 1.5rem; color: #28a745; margin-top: 10px;"><i class="fas fa-circle-check"></i> Systems Nominal</h2>
      </div>
    </div>


    <div style="background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; box-shadow: 0 4px 12px var(--shadow-accent); overflow-x: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 15px;">
        <h2 style="margin: 0; font-size: 1.5rem;"><i class="fas fa-boxes-stacked"></i> Global Manifest Registry</h2>
        <button id="reset-db-btn" class="btn-download-pdf" style="font-size: 0.85rem; padding: 6px 12px;"><i class="fas fa-rotate"></i> Reset Defaults</button>
      </div>


      <table style="width: 100%; border-collapse: collapse; text-align: left;" id="admin-manifest-table">
        <thead>
          <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-header); font-weight: bold;">
            <th style="padding: 12px 8px;">Waybill ID</th>
            <th style="padding: 12px 8px;">Current Hub Coordinates</th>
            <th style="padding: 12px 8px;">ETA Window</th>
            <th style="padding: 12px 8px;">Global Pipeline Stage</th>
            <th style="padding: 12px 8px; text-align: right;">Action Control Loop</th>
          </tr>
        </thead>
        <tbody id="manifest-table-body">

        </tbody>
      </table>
    </div>

  </main>

  <script src="admin.js"></script>
</body>
</html>
